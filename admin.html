<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>EstateQuoter Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .status-open { background: #dcfce7; color: #166534; }
    .status-quoted { background: #dbeafe; color: #1e40af; }
    .status-closed { background: #f3e8ff; color: #7c3aed; }
    .status-archived { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app"></div>

  <script>
    const ADMIN_EMAIL = "contact@estatequoter.com";
    const ADMIN_PASSWORD = "estatequoter2025";
    const API_URL = "https://freetrials.zo.space/api/estatequoter/leads";

    let state = {
      loggedIn: false,
      email: "contact@estatequoter.com",
      password: "",
      error: false,
      leads: [],
      search: "",
      loading: false,
      viewingLead: null,
      showArchive: false,
      confirmingDelete: null
    };

    // Keep search input value separate from state to avoid focus issues
    let searchInputValue = "";

    function render() {
      const app = document.getElementById('app');
      
      if (!state.loggedIn) {
        app.innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-indigo-600 to-purple-700 flex items-center justify-center p-4">
            <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-md">
              <div class="text-center mb-8">
                <div class="text-4xl mb-2">🔐</div>
                <h1 class="text-2xl font-bold text-gray-800">EstateQuoter Admin</h1>
              </div>
              <div class="space-y-4">
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-1">Admin Email</label>
                  <input type="email" id="email" value="${state.email}" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg text-gray-800 focus:border-indigo-500 focus:outline-none">
                </div>
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                  <input type="password" id="password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg text-gray-800 focus:border-indigo-500 focus:outline-none">
                </div>
                <button onclick="handleLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition-colors">Login</button>
                ${state.error ? '<div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm text-center">Invalid credentials</div>' : ''}
              </div>
            </div>
          </div>
        `;
        
        document.getElementById('password')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
        return;
      }

      const filtered = (state.showArchive ? state.leads.filter(l => l.archived) : state.leads.filter(l => !l.archived))
        .filter(l => {
          const term = searchInputValue.toLowerCase();
          return !term || 
            (l.customer_name || '').toLowerCase().includes(term) ||
            (l.customer_email || '').toLowerCase().includes(term) ||
            (l.zip || '').includes(term);
        });

      const activeLeads = state.leads.filter(l => !l.archived);
      const archivedLeads = state.leads.filter(l => l.archived);
      const openCount = activeLeads.filter(l => l.status === 'open' || !l.status).length;
      const quotedCount = activeLeads.filter(l => l.status === 'quoted').length;
      const closedCount = activeLeads.filter(l => l.status === 'closed').length;

      app.innerHTML = `
        <div class="min-h-screen bg-gray-50">
          <div class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
              <div>
                <h1 class="text-xl font-bold text-gray-800">EstateQuoter Admin</h1>
                <p class="text-sm text-gray-500">${activeLeads.length} active leads • ${archivedLeads.length} archived</p>
              </div>
              <div class="flex gap-2">
                <button onclick="${state.showArchive ? 'showActive()' : 'showArchive()'}" class="${state.showArchive ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'} px-4 py-2 rounded-lg font-medium">${state.showArchive ? 'View Active' : 'View Archive'}</button>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-medium">Logout</button>
              </div>
            </div>
          </div>

          <div class="max-w-7xl mx-auto px-4 py-6">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
              <div class="bg-white p-4 rounded-lg shadow-sm"><div class="text-3xl font-bold text-indigo-600">${activeLeads.length}</div><div class="text-sm text-gray-500 uppercase">Active</div></div>
              <div class="bg-white p-4 rounded-lg shadow-sm"><div class="text-3xl font-bold text-green-600">${openCount}</div><div class="text-sm text-gray-500 uppercase">Open</div></div>
              <div class="bg-white p-4 rounded-lg shadow-sm"><div class="text-3xl font-bold text-blue-600">${quotedCount}</div><div class="text-sm text-gray-500 uppercase">Quoted</div></div>
              <div class="bg-white p-4 rounded-lg shadow-sm"><div class="text-3xl font-bold text-purple-600">${closedCount}</div><div class="text-sm text-gray-500 uppercase">Closed</div></div>
              <div class="bg-white p-4 rounded-lg shadow-sm"><div class="text-3xl font-bold text-red-600">${archivedLeads.length}</div><div class="text-sm text-gray-500 uppercase">Archived</div></div>
            </div>

            <div class="bg-white rounded-lg shadow-sm p-4 mb-4">
              <input type="text" placeholder="Search by name, email, or ZIP..." id="searchInput" class="w-full md:w-96 px-4 py-2 border border-gray-300 rounded-lg text-gray-800">
            </div>

            <div class="bg-white rounded-lg shadow-sm overflow-hidden">
              ${state.loading ? '<div class="p-12 text-center text-gray-500">Loading leads...</div>' : 
                !filtered.length ? `<div class="p-12 text-center text-gray-500">${searchInputValue ? 'No leads match' : state.showArchive ? 'No archived leads' : 'No leads found'}</div>` : `
                <div class="overflow-x-auto">
                  <table class="w-full">
                    <thead class="bg-gray-50 border-b"><tr><th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Name</th><th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Email</th><th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Phone</th><th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">ZIP</th>${!state.showArchive ? '<th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Status</th>' : '<th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Archived</th>'}<th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Action</th></tr></thead>
                    <tbody>
                      ${filtered.map(lead => `
                        <tr class="border-b hover:bg-gray-50">
                          <td class="px-4 py-3 text-sm text-gray-800 font-medium">${lead.customer_name || '—'}</td>
                          <td class="px-4 py-3 text-sm text-gray-600">${lead.customer_email || '—'}</td>
                          <td class="px-4 py-3 text-sm text-gray-600">${lead.customer_phone || '—'}</td>
                          <td class="px-4 py-3 text-sm text-gray-600">${lead.zip || '—'}</td>
                          ${!state.showArchive ? `
                          <td class="px-4 py-3">
                            <select onchange="updateStatus('${lead.id}', this.value)" class="px-2 py-1 rounded text-xs font-medium border-0 cursor-pointer ${lead.status === 'closed' ? 'status-closed' : lead.status === 'quoted' ? 'status-quoted' : 'status-open'}">
                              <option value="open" ${lead.status === 'open' || !lead.status ? 'selected' : ''}>Open</option>
                              <option value="quoted" ${lead.status === 'quoted' ? 'selected' : ''}>Quoted</option>
                              <option value="closed" ${lead.status === 'closed' ? 'selected' : ''}>Closed</option>
                            </select>
                          </td>
                          ` : `<td class="px-4 py-3"><span class="status-archived px-2 py-1 rounded text-xs font-medium">${new Date(lead.archived_at).toLocaleDateString()}</span></td>`}
                          <td class="px-4 py-3">
                            <div class="flex items-center gap-3">
                              <button onclick="viewLead('${lead.id}')" class="text-indigo-600 hover:text-indigo-800 font-medium">View</button>
                              ${!state.showArchive ? 
                                `<button onclick="archiveLead('${lead.id}')" class="text-gray-500 hover:text-red-600 transition-colors" title="Archive lead">🗑️</button>` :
                                `<button onclick="restoreLead('${lead.id}')" class="text-green-600 hover:text-green-800 font-medium text-sm">Restore</button>
                                 <button onclick="confirmPermanentDelete('${lead.id}')" class="text-gray-500 hover:text-red-600 transition-colors ml-2" title="Delete forever">🗑️</button>`
                              }
                            </div>
                          </td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              `}
            </div>
          </div>

          ${state.viewingLead ? renderLeadModal(state.viewingLead) : ''}
          ${state.confirmingDelete ? renderDeleteConfirmModal(state.confirmingDelete) : ''}
        </div>
      `;

      // Setup search input with proper event handling
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.value = searchInputValue;
        searchInput.addEventListener('input', (e) => {
          searchInputValue = e.target.value;
          render();
          // Restore focus and cursor position
          const input = document.getElementById('searchInput');
          if (input) {
            input.focus();
            input.setSelectionRange(searchInputValue.length, searchInputValue.length);
          }
        });
      }
    }

    function renderLeadModal(lead) {
      return `
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" onclick="if(event.target === this) closeModal()">
          <div class="bg-white rounded-xl max-w-5xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b flex justify-between items-center">
              <h2 class="text-xl font-bold text-gray-900">${lead.customer_name} — Lead Details</h2>
              <button onclick="closeModal()" class="text-gray-500 hover:text-gray-800 text-2xl">×</button>
            </div>
            <div class="p-6 space-y-6">
              
              <div>
                <h3 class="text-sm font-semibold text-indigo-600 uppercase mb-3">📋 Contact Information</h3>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Name</div><div class="font-medium text-gray-900">${lead.customer_name || '—'}</div></div>
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Email</div><div class="font-medium text-gray-900">${lead.customer_email || '—'}</div></div>
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Phone</div><div class="font-medium text-gray-900">${lead.customer_phone || '—'}</div></div>
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">ZIP (Entered)</div><div class="font-medium text-gray-900">${lead.zip || '—'}</div></div>
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">City</div><div class="font-medium text-gray-900">${lead.city || '—'}</div></div>
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Region</div><div class="font-medium text-gray-900">${lead.region || '—'}</div></div>
                </div>
              </div>

              <div>
                <h3 class="text-sm font-semibold text-indigo-600 uppercase mb-3">🎯 Role & Needs</h3>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Your Role</div><div class="font-medium text-gray-900">${lead.role || '—'}</div></div>
                  ${lead.role_other ? `<div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Role (Other)</div><div class="font-medium text-gray-900">${lead.role_other}</div></div>` : ''}
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">What You Need Most</div><div class="font-medium text-gray-900">${lead.needs || '—'}</div></div>
                  ${lead.needs_other ? `<div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Needs (Other)</div><div class="font-medium text-gray-900">${lead.needs_other}</div></div>` : ''}
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Clear Out Needs</div><div class="font-medium text-gray-900">${lead.clear_out || '—'}</div></div>
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Timeline</div><div class="font-medium text-gray-900">${lead.timeline || '—'}</div></div>
                </div>
              </div>

              <div>
                <h3 class="text-sm font-semibold text-indigo-600 uppercase mb-3">🏠 Property Details</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Property Type</div><div class="font-medium text-gray-900">${lead.property_type || '—'}</div></div>
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Bedrooms</div><div class="font-medium text-gray-900">${lead.bedrooms || '—'}</div></div>
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Bathrooms</div><div class="font-medium text-gray-900">${lead.bathrooms || '—'}</div></div>
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Square Footage</div><div class="font-medium text-gray-900">${lead.square_footage ? lead.square_footage.toLocaleString() + ' sqft' : '—'}</div></div>
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Fullness Level</div><div class="font-medium text-gray-900">${lead.fullness || '—'}</div></div>
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Home Value</div><div class="font-medium text-gray-900">${lead.home_value ? '$' + lead.home_value.toLocaleString() : '—'}</div></div>
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Extra Rooms</div><div class="font-medium text-gray-900">${lead.extra_rooms || '—'}</div></div>
                  ${lead.extra_rooms_other ? `<div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Extra Rooms (Other)</div><div class="font-medium text-gray-900">${lead.extra_rooms_other}</div></div>` : ''}
                </div>
              </div>

              <div>
                <h3 class="text-sm font-semibold text-indigo-600 uppercase mb-3">💎 Special Items & Access</h3>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">High Value Items</div><div class="font-medium text-gray-900">${lead.high_value || '—'}</div></div>
                  ${lead.high_value_other ? `<div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">High Value (Other)</div><div class="font-medium text-gray-900">${lead.high_value_other}</div></div>` : ''}
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Oversized Items</div><div class="font-medium text-gray-900">${lead.oversized || '—'}</div></div>
                  ${lead.oversized_other ? `<div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Oversized (Other)</div><div class="font-medium text-gray-900">${lead.oversized_other}</div></div>` : ''}
                  <div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Access Requirements</div><div class="font-medium text-gray-900">${lead.access || '—'}</div></div>
                  ${lead.access_other ? `<div class="bg-gray-100 p-3 rounded"><div class="text-xs text-gray-600">Access (Other)</div><div class="font-medium text-gray-900">${lead.access_other}</div></div>` : ''}
                </div>
              </div>

              ${lead.has_media ? `
                <div>
                  <h3 class="text-sm font-semibold text-indigo-600 uppercase mb-3">📸 Media (${lead.media_count || 0} items)</h3>
                  <div class="bg-gray-100 p-4 rounded">
                    ${lead.media_urls ? lead.media_urls.split(',').map(url => url.trim()).filter(u => u).map(url => 
                      `<a href="${url}" target="_blank" class="inline-block mr-2 mb-2 px-3 py-2 bg-white rounded border hover:bg-indigo-50 text-sm text-indigo-600 hover:text-indigo-800 transition-colors">📷 View Image</a>`
                    ).join('') : '<span class="text-gray-500">Media URLs not available</span>'}
                  </div>
                </div>
              ` : ''}

              ${lead.notes ? `
                <div>
                  <h3 class="text-sm font-semibold text-indigo-600 uppercase mb-3">📝 Additional Notes</h3>
                  <div class="bg-gray-100 p-4 rounded text-gray-900">${lead.notes}</div>
                </div>
              ` : ''}

              <div class="pt-4 border-t">
                <h3 class="text-xs font-semibold text-gray-500 uppercase mb-2">🔧 Technical Metadata (Auto-Detected from Submission)</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs text-gray-500">
                  <div><span class="text-gray-400">Lead ID:</span> ${lead.id || '—'}</div>
                  <div><span class="text-gray-400">Lead #:</span> ${lead.lead_number || '—'}</div>
                  <div><span class="text-gray-400">Submitted:</span> ${lead.created_at ? new Date(lead.created_at).toLocaleString() : '—'}</div>
                  <div><span class="text-gray-400">Status:</span> ${lead.status || 'open'}</div>
                  <div><span class="text-gray-400">Device:</span> ${lead.device || '—'}</div>
                  <div><span class="text-gray-400">IP:</span> ${lead.ip || '—'}</div>
                  <div><span class="text-gray-400">ISP:</span> ${lead.isp || '—'}</div>
                  <div><span class="text-gray-400">Coords:</span> ${lead.latitude && lead.longitude ? `${lead.latitude}, ${lead.longitude}` : '—'}</div>
                  ${lead.postal ? `<div><span class="text-gray-400">Postal (Detected):</span> ${lead.postal}</div>` : ''}
                  ${lead.country ? `<div><span class="text-gray-400">Country (Detected):</span> ${lead.country}</div>` : ''}
                </div>
                ${lead.user_agent ? `<div class="mt-2 text-xs text-gray-400 break-all">User Agent: ${lead.user_agent}</div>` : ''}
                ${lead.referrer ? `<div class="mt-1 text-xs text-gray-400">Referrer: ${lead.referrer}</div>` : ''}
                ${lead.page_url ? `<div class="mt-1 text-xs text-gray-400">Page: ${lead.page_url}</div>` : ''}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderDeleteConfirmModal(lead) {
      return `
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" onclick="if(event.target === this) closeDeleteConfirm()">
          <div class="bg-white rounded-xl max-w-md w-full p-6">
            <div class="text-center mb-6">
              <div class="text-5xl mb-4">⚠️</div>
              <h2 class="text-xl font-bold text-red-600 mb-2">Permanent Delete</h2>
              <p class="text-gray-600">This lead is already archived. Deleting it now will remove it <strong>forever</strong> and it cannot be recovered.</p>
            </div>
            <div class="bg-red-50 border border-red-200 rounded-lg p-3 mb-6">
              <div class="text-sm text-red-800"><strong>Lead:</strong> ${lead.customer_name}</div>
              <div class="text-xs text-red-600 mt-1">ID: ${lead.id}</div>
            </div>
            <div class="flex gap-3">
              <button onclick="closeDeleteConfirm()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 rounded-lg">Cancel</button>
              <button onclick="permanentDeleteLead('${lead.id}')" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-medium py-2 rounded-lg">Delete Forever</button>
            </div>
          </div>
        </div>
      `;
    }

    async function loadLeads() {
      state.loading = true;
      render();
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        state.leads = data.leads || [];
      } catch (err) {
        state.leads = [];
      }
      state.loading = false;
      render();
    }

    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
        state.loggedIn = true;
        state.error = false;
        loadLeads();
      } else {
        state.error = true;
        render();
      }
    }

    function logout() {
      state.loggedIn = false;
      state.password = "";
      render();
    }

    function showArchive() {
      state.showArchive = true;
      render();
    }

    function showActive() {
      state.showArchive = false;
      render();
    }

    async function updateStatus(id, newStatus) {
      try {
        const res = await fetch(API_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, status: newStatus })
        });
        if (res.ok) {
          state.leads = state.leads.map(l => l.id === id ? { ...l, status: newStatus, updated_at: new Date().toISOString() } : l);
          render();
        }
      } catch (err) {
        console.error('Failed to update status:', err);
      }
    }

    function viewLead(id) {
      state.viewingLead = state.leads.find(l => l.id === id);
      render();
    }

    function closeModal() {
      state.viewingLead = null;
      render();
    }

    async function archiveLead(id) {
      try {
        const res = await fetch(API_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, archived: true, archived_at: new Date().toISOString() })
        });
        if (res.ok) {
          state.leads = state.leads.map(l => l.id === id ? { ...l, archived: true, archived_at: new Date().toISOString() } : l);
          render();
        }
      } catch (err) {
        console.error('Failed to archive lead:', err);
      }
    }

    async function restoreLead(id) {
      try {
        const res = await fetch(API_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, archived: false, archived_at: null })
        });
        if (res.ok) {
          state.leads = state.leads.map(l => l.id === id ? { ...l, archived: false, archived_at: null } : l);
          render();
        }
      } catch (err) {
        console.error('Failed to restore lead:', err);
      }
    }

    function confirmPermanentDelete(id) {
      state.confirmingDelete = state.leads.find(l => l.id === id);
      render();
    }

    function closeDeleteConfirm() {
      state.confirmingDelete = null;
      render();
    }

    async function permanentDeleteLead(id) {
      try {
        const res = await fetch(API_URL, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        if (res.ok) {
          state.leads = state.leads.filter(l => l.id !== id);
          state.confirmingDelete = null;
          render();
        }
      } catch (err) {
        console.error('Failed to delete lead:', err);
      }
    }

    // Initial render
    render();
